<header class="sticky top-0 z-50 border-b border-slate-200 bg-white/90 backdrop-blur">
  <nav class="relative mx-auto flex max-w-7xl items-center justify-between px-6 py-4">

    <!-- LOGO ESCRITORIO -->
    <a routerLink="/" class="hidden items-center gap-2 md:flex">
      <div
        class="flex h-10 w-10 items-center justify-center rounded-xl bg-slate-900 text-white font-bold"
      >
        DD
      </div>

      <span class="text-xl font-bold text-slate-900">
        DevDuo Studio
      </span>
    </a>

    <!-- LOGO MÓVIL: abre menú -->
    <button
      type="button"
      (click)="toggleMobileMenu()"
      class="flex items-center gap-2 md:hidden"
    >
      <div
        class="flex h-10 w-10 items-center justify-center rounded-xl bg-slate-900 text-white font-bold"
      >
        DD
      </div>

      <span class="text-xl font-bold text-slate-900">
        DevDuo Studio
      </span>
    </button>

    <!-- NAV ESCRITORIO -->
    <div class="hidden items-center gap-8 md:flex">

      <a
        routerLink="/"
        [routerLinkActiveOptions]="{ exact: true }"
        routerLinkActive="active-link"
        class="nav-link"
      >
        Inicio
      </a>

      <a
        routerLink="/programadores"
        routerLinkActive="active-link"
        class="nav-link"
      >
        Programadores
      </a>

      <a
        routerLink="/proyectos"
        routerLinkActive="active-link"
        class="nav-link"
      >
        Proyectos
      </a>

      <a
        routerLink="/solicitudes"
        routerLinkActive="active-link"
        class="nav-link"
      >
        Solicitudes
      </a>

      <a
        routerLink="/login"
        routerLinkActive="active-link"
        class="nav-link"
      >
        Login
      </a>

    </div>

    <!-- BOTÓN ESCRITORIO -->
    <a
      routerLink="/solicitud"
      class="hidden rounded-full bg-violet-600 px-5 py-2.5 text-sm font-semibold text-white shadow-md transition hover:bg-violet-700 md:inline-flex"
    >
      Contactar
    </a>

    <!-- MENÚ MÓVIL -->
    @if (isMobileMenuOpen()) {
      <div
        class="absolute left-4 right-4 top-full mt-3 rounded-3xl border border-slate-200 bg-white p-4 shadow-xl md:hidden"
      >
        <div class="flex flex-col gap-2">

          <a
            routerLink="/"
            [routerLinkActiveOptions]="{ exact: true }"
            routerLinkActive="mobile-active-link"
            class="mobile-nav-link"
            (click)="closeMobileMenu()"
          >
            Inicio
          </a>

          <a
            routerLink="/programadores"
            routerLinkActive="mobile-active-link"
            class="mobile-nav-link"
            (click)="closeMobileMenu()"
          >
            Programadores
          </a>

          <a
            routerLink="/proyectos"
            routerLinkActive="mobile-active-link"
            class="mobile-nav-link"
            (click)="closeMobileMenu()"
          >
            Proyectos
          </a>

          <a
            routerLink="/solicitudes"
            routerLinkActive="mobile-active-link"
            class="mobile-nav-link"
            (click)="closeMobileMenu()"
          >
            Solicitudes
          </a>

          <a
            routerLink="/login"
            routerLinkActive="mobile-active-link"
            class="mobile-nav-link"
            (click)="closeMobileMenu()"
          >
            Login
          </a>

          <a
            routerLink="/solicitud"
            class="mt-3 rounded-2xl bg-violet-600 px-5 py-3 text-center font-semibold text-white shadow-md transition hover:bg-violet-700"
            (click)="closeMobileMenu()"
          >
            Contactar
          </a>

        </div>
      </div>
    }

  </nav>
</header>
