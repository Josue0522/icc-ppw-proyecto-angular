<section class="bg-slate-50 py-24">
  <div class="mx-auto max-w-3xl px-6">

    <div class="mb-12 text-center">
      <span class="text-sm font-semibold uppercase tracking-widest text-violet-600">
        Contacto
      </span>

      <h1 class="mt-4 text-4xl font-extrabold text-slate-900">
        Trabaja con nosotros
      </h1>

      <p class="mt-4 text-slate-600">
        Describe tu idea y selecciona el programador con quien deseas trabajar.
      </p>
    </div>

    <form
      class="rounded-3xl border border-slate-200 bg-white p-8 shadow-sm"
      (ngSubmit)="submitRequest()"
    >
      <div class="grid gap-6">

        <div>
          <label class="mb-2 block font-medium text-slate-700">
            Nombre
          </label>

          <input
            type="text"
            name="nombre"
            [(ngModel)]="nombre"
            placeholder="Ingresa tu nombre"
            class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none transition focus:border-violet-500"
          />
        </div>

        <div>
          <label class="mb-2 block font-medium text-slate-700">
            Correo electrónico
          </label>

          <input
            type="email"
            name="correo"
            [(ngModel)]="correo"
            placeholder="correo@ejemplo.com"
            class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none transition focus:border-violet-500"
          />
        </div>

        <div>
          <label class="mb-2 block font-medium text-slate-700">
            Programador
          </label>

          <select
            name="programadorSlug"
            [(ngModel)]="programadorSlug"
            class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none transition focus:border-violet-500"
          >
            <option value="">Seleccionar programador</option>

            @if (programadores$ | async; as response) {
              @for (programador of response.data; track programador.id) {
                <option [value]="programador.slug">
                  {{ programador.nombreCompleto }}
                </option>
              }
            }
          </select>
        </div>

        <div>
          <label class="mb-2 block font-medium text-slate-700">
            Idea del proyecto
          </label>

          <textarea
            rows="6"
            name="descripcionProyecto"
            [(ngModel)]="descripcionProyecto"
            placeholder="Describe tu proyecto..."
            class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none transition focus:border-violet-500"
          ></textarea>
        </div>

        @if (errorMessage()) {
          <div class="rounded-xl bg-red-50 px-4 py-3 text-sm font-medium text-red-600">
            {{ errorMessage() }}
          </div>
        }

        @if (successMessage()) {
          <div class="rounded-xl bg-green-50 px-4 py-3 text-sm font-medium text-green-600">
            {{ successMessage() }}
          </div>
        }

        <button
          type="submit"
          [disabled]="isLoading()"
          class="rounded-xl bg-violet-600 px-6 py-4 font-semibold text-white transition hover:bg-violet-700 disabled:cursor-not-allowed disabled:opacity-60"
        >
          {{ isLoading() ? 'Enviando...' : 'Enviar solicitud' }}
        </button>

      </div>
    </form>

  </div>
</section>
