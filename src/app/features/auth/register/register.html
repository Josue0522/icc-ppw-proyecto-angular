<section class="bg-slate-50 py-24">
  <div class="mx-auto max-w-3xl px-6">
    <div class="mb-10 text-center">
      <span class="text-sm font-semibold uppercase tracking-widest text-violet-600">
        Crear cuenta
      </span>

      <h1 class="mt-4 text-4xl font-extrabold text-slate-900">
        Regístrate en DevDuo Studio
      </h1>

      <p class="mt-4 text-slate-600">
        Crea una cuenta para enviar solicitudes de contacto.
      </p>
    </div>

    <form class="rounded-3xl border border-slate-200 bg-white p-8 shadow-sm">
      <div class="grid gap-5">
        <div>
          <label class="mb-2 block font-medium text-slate-700">Nombre completo</label>
          <input
            type="text"
            placeholder="Tu nombre"
            class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none transition focus:border-violet-500"
          />
        </div>

        <div>
          <label class="mb-2 block font-medium text-slate-700">Correo electrónico</label>
          <input
            type="email"
            placeholder="correo@ejemplo.com"
            class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none transition focus:border-violet-500"
          />
        </div>

        <div>
          <label class="mb-2 block font-medium text-slate-700">Contraseña</label>
          <input
            type="password"
            placeholder="••••••••"
            class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none transition focus:border-violet-500"
          />
        </div>

        <button
          type="submit"
          class="rounded-xl bg-violet-600 px-6 py-4 font-semibold text-white transition hover:bg-violet-700"
        >
          Crear cuenta
        </button>
      </div>

      <p class="mt-6 text-center text-slate-600">
        ¿Ya tienes cuenta?
        <a routerLink="/login" class="font-semibold text-violet-600">
          Inicia sesión
        </a>
      </p>
    </form>
  </div>
</section>
