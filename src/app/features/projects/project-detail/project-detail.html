<section class="bg-slate-50 py-24">
  <div class="mx-auto max-w-6xl px-6">

    <a
      routerLink="/proyectos"
      class="mb-8 inline-block font-semibold text-violet-600"
    >
      ← Volver a proyectos
    </a>

    <div class="overflow-hidden rounded-3xl border border-slate-200 bg-white shadow-sm">
      <img
        [src]="project().image"
        [alt]="project().title"
        class="h-80 w-full object-cover"
      />

      <div class="p-8">
        <span class="rounded-full bg-violet-100 px-3 py-1 text-sm font-medium text-violet-700">
          {{ project().type }}
        </span>

        <h1 class="mt-5 text-4xl font-extrabold text-slate-900">
          {{ project().title }}
        </h1>

        <p class="mt-5 text-lg leading-8 text-slate-600">
          {{ project().description }}
        </p>

        <div class="mt-8">
          <h2 class="text-2xl font-bold text-slate-900">
            Tecnologías utilizadas
          </h2>

          <div class="mt-4 flex flex-wrap gap-3">
            @for (tech of project().technologies; track tech) {
              <span class="rounded-full bg-slate-100 px-4 py-2 text-slate-700">
                {{ tech }}
              </span>
            }
          </div>
        </div>

        <div class="mt-8 grid gap-6 md:grid-cols-2">
          <div class="rounded-2xl bg-slate-50 p-6">
            <h3 class="font-bold text-slate-900">
              Tipo de proyecto
            </h3>

            <p class="mt-2 text-slate-600">
              {{ project().type }}
            </p>
          </div>

          <div class="rounded-2xl bg-slate-50 p-6">
            <h3 class="font-bold text-slate-900">
              Participantes
            </h3>

            <p class="mt-2 text-slate-600">
              {{ project().participants }}
            </p>
          </div>
        </div>

        <div class="mt-10 flex flex-wrap gap-4">
          <a
            [href]="project().repository"
            target="_blank"
            class="rounded-xl bg-slate-900 px-6 py-3 font-semibold text-white hover:bg-slate-800"
          >
            Ver repositorio
          </a>

          <a
            [href]="project().demo"
            target="_blank"
            class="rounded-xl border border-slate-300 px-6 py-3 font-semibold text-slate-800 hover:bg-slate-100"
          >
            Ver demo
          </a>
        </div>
      </div>
    </div>

  </div>
</section>
